<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>数物工作周报</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #101112;
      --panel: #191b1d;
      --panel-soft: #202326;
      --panel-strong: #25292d;
      --line: #343a40;
      --text: #f3f2ee;
      --muted: #aeb4b7;
      --muted-strong: #c8cdcf;
      --accent: #4fd1bd;
      --accent-strong: #79ead9;
      --amber: #f2b84b;
      --danger: #ff6b6b;
      --success: #70d67b;
      --shadow: rgba(0, 0, 0, 0.32);
      --radius: 8px;
      font-family: "Microsoft YaHei", "PingFang SC", "Segoe UI", system-ui, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-width: 320px;
      background: var(--bg);
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(180deg, rgba(79, 209, 189, 0.05), transparent 260px),
        var(--bg);
      color: var(--text);
      line-height: 1.5;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel-strong);
      color: var(--text);
      min-height: 36px;
      padding: 0 12px;
      cursor: pointer;
      transition: border-color 160ms ease, background 160ms ease, color 160ms ease;
    }

    button:hover,
    button:focus-visible {
      border-color: var(--accent);
      outline: none;
    }

    button.primary {
      background: var(--accent);
      color: #071311;
      border-color: var(--accent);
      font-weight: 700;
    }

    button.ghost {
      background: transparent;
    }

    button.danger {
      color: #ffd7d7;
      border-color: rgba(255, 107, 107, 0.5);
      background: rgba(255, 107, 107, 0.1);
    }

    button.icon-only {
      width: 36px;
      min-width: 36px;
      padding: 0;
      display: inline-grid;
      place-items: center;
    }

    label,
    .label {
      color: var(--muted-strong);
      display: block;
      font-size: 13px;
      margin-bottom: 6px;
    }

    input,
    select,
    textarea {
      width: 100%;
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #121416;
      min-height: 38px;
      padding: 8px 10px;
    }

    textarea {
      resize: vertical;
      line-height: 1.58;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: var(--accent);
      outline: none;
      box-shadow: 0 0 0 3px rgba(79, 209, 189, 0.12);
    }

    input[type="date"] {
      min-width: 150px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th,
    td {
      border-bottom: 1px solid var(--line);
      padding: 9px 8px;
      text-align: left;
      vertical-align: top;
    }

    th {
      color: var(--muted-strong);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0;
      background: rgba(255, 255, 255, 0.02);
    }

    td.amount,
    th.amount {
      text-align: right;
      white-space: nowrap;
    }

    .app {
      width: min(1500px, calc(100% - 32px));
      margin: 0 auto;
      padding: 18px 0 28px;
    }

    .topbar {
      display: grid;
      grid-template-columns: minmax(260px, 1fr) auto;
      gap: 16px;
      align-items: center;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(25, 27, 29, 0.9);
      box-shadow: 0 18px 34px var(--shadow);
    }

    .title-block h1 {
      font-size: clamp(22px, 3vw, 30px);
      line-height: 1.15;
      margin: 0 0 8px;
      letter-spacing: 0;
    }

    .save-state {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(3, minmax(118px, 1fr));
      gap: 10px;
      min-width: min(100%, 430px);
    }

    .metric {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel-soft);
      padding: 10px 12px;
    }

    .metric span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 3px;
    }

    .metric strong {
      display: block;
      font-size: 18px;
      line-height: 1.25;
      color: var(--text);
      overflow-wrap: anywhere;
    }

    .metric small {
      display: block;
      min-height: 16px;
      margin-top: 4px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    .workspace {
      display: grid;
      grid-template-columns: minmax(330px, 0.95fr) minmax(360px, 1.05fr) minmax(420px, 1.25fr);
      gap: 16px;
      align-items: start;
      margin-top: 16px;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      min-width: 0;
      overflow: hidden;
    }

    .panel-header,
    .panel-body,
    .panel-footer {
      padding: 14px;
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.02);
    }

    .panel-header h2 {
      margin: 0;
      font-size: 18px;
      letter-spacing: 0;
    }

    .panel-header small {
      color: var(--muted);
      white-space: nowrap;
    }

    .panel-footer {
      border-top: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.018);
    }

    .field-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .field-grid.three {
      grid-template-columns: 1fr 0.95fr 0.75fr;
    }

    .field-grid.report-controls {
      grid-template-columns: minmax(110px, 1fr) minmax(140px, 1fr) minmax(140px, 1fr) auto;
      align-items: end;
    }

    .field {
      min-width: 0;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .actions.between {
      justify-content: space-between;
    }

    .journal-text {
      min-height: 410px;
      margin-top: 12px;
    }

    .week-strip {
      display: grid;
      grid-template-columns: repeat(7, minmax(50px, 1fr));
      gap: 6px;
      margin-top: 12px;
    }

    .day-pill {
      min-height: 58px;
      padding: 8px 3px;
      text-align: center;
      background: var(--panel-soft);
      overflow: visible;
    }

    .day-pill strong,
    .day-pill span {
      display: block;
      overflow: visible;
      text-overflow: clip;
      white-space: nowrap;
    }

    .day-pill strong {
      font-size: 12px;
    }

    .day-pill span {
      color: var(--muted);
      font-size: 11px;
      margin-top: 2px;
    }

    .day-pill .day-total {
      color: var(--accent-strong);
      font-size: 11px;
      font-weight: 700;
      margin-top: 3px;
    }

    .day-pill.active {
      border-color: var(--accent);
      background: rgba(79, 209, 189, 0.12);
    }

    .day-pill.has-note strong::after,
    .day-pill.has-expense strong::after {
      content: "";
      display: inline-block;
      width: 6px;
      height: 6px;
      margin-left: 6px;
      border-radius: 50%;
      background: var(--amber);
      vertical-align: middle;
    }

    .journal-meta {
      color: var(--muted);
      font-size: 13px;
    }

    .expense-form {
      display: grid;
      grid-template-columns: 1fr 1fr auto;
      gap: 12px;
      margin-bottom: 12px;
    }

    .expense-form .submit-row {
      grid-column: 1 / -1;
      display: flex;
      justify-content: flex-end;
    }

    .segment {
      display: inline-flex;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: #121416;
    }

    .segment button {
      border: 0;
      border-radius: 0;
      background: transparent;
      min-height: 34px;
    }

    .segment button.active {
      background: var(--accent);
      color: #071311;
      font-weight: 700;
    }

    .summary-line {
      color: var(--muted-strong);
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin: 12px 0;
      font-size: 14px;
    }

    .summary-line strong {
      color: var(--text);
    }

    .table-wrap {
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #121416;
      max-height: 420px;
    }

    details.trip-import-panel {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      margin: 12px 0;
      background: rgba(255, 255, 255, 0.018);
    }

    details.trip-import-panel summary {
      cursor: pointer;
      color: var(--muted-strong);
      font-weight: 700;
      padding: 10px 12px;
    }

    .trip-import-body {
      border-top: 1px solid var(--line);
      padding: 12px;
    }

    .trip-import-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 10px;
    }

    .trip-import-text {
      min-height: 130px;
      font-family: Consolas, "SFMono-Regular", "Microsoft YaHei", monospace;
      font-size: 12px;
    }

    .trip-import-result {
      margin-top: 10px;
    }

    .trip-import-result input[type="date"],
    .trip-import-result input[type="number"],
    .trip-import-result input[type="text"] {
      min-height: 32px;
      padding: 5px 7px;
      font-size: 12px;
    }

    .trip-import-result input[type="checkbox"] {
      width: 16px;
      min-height: 16px;
      padding: 0;
      accent-color: var(--accent);
    }

    .trip-import-result .table-wrap {
      max-height: 300px;
    }

    .empty {
      color: var(--muted);
      padding: 18px;
      text-align: center;
    }

    .type-badge {
      display: inline-block;
      border: 1px solid rgba(79, 209, 189, 0.35);
      border-radius: 999px;
      padding: 2px 8px;
      color: var(--accent-strong);
      background: rgba(79, 209, 189, 0.08);
      white-space: nowrap;
      font-size: 12px;
    }

    .template-tools {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 10px 0;
    }

    .token-button {
      min-height: 30px;
      padding: 0 8px;
      font-family: Consolas, "SFMono-Regular", monospace;
      font-size: 12px;
      color: var(--accent-strong);
      background: rgba(79, 209, 189, 0.08);
    }

    .template-text {
      min-height: 230px;
      font-family: Consolas, "SFMono-Regular", monospace;
      font-size: 13px;
    }

    details.template-panel {
      border-top: 1px solid var(--line);
      margin-top: 12px;
      padding-top: 12px;
    }

    details.template-panel summary {
      cursor: pointer;
      color: var(--muted-strong);
      font-weight: 700;
      margin-bottom: 8px;
    }

    .report-grid {
      display: grid;
      grid-template-columns: minmax(0, 0.95fr) minmax(0, 1.05fr);
      gap: 12px;
      margin-top: 12px;
    }

    .report-source {
      min-height: 420px;
      font-family: Consolas, "SFMono-Regular", monospace;
      font-size: 12px;
    }

    .source-hidden {
      position: fixed;
      left: -9999px;
      top: 0;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
    }

    .preview-frame {
      width: 100%;
      height: 420px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
    }

    .toast {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 30;
      max-width: min(360px, calc(100vw - 36px));
      transform: translateY(20px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 180ms ease, transform 180ms ease;
      border: 1px solid rgba(79, 209, 189, 0.45);
      border-radius: 8px;
      padding: 10px 12px;
      background: #111617;
      color: var(--text);
      box-shadow: 0 12px 26px var(--shadow);
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    @media (max-width: 1220px) {
      .workspace {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .report-panel {
        grid-column: 1 / -1;
      }
    }

    @media (max-width: 820px) {
      .app {
        width: min(100% - 20px, 720px);
      }

      .topbar,
      .workspace,
      .report-grid,
      .field-grid,
      .field-grid.three,
      .field-grid.report-controls {
        grid-template-columns: 1fr;
      }

      .metrics {
        grid-template-columns: 1fr;
        min-width: 0;
      }

      .week-strip {
        grid-template-columns: repeat(7, minmax(50px, 1fr));
      }

      .expense-form {
        grid-template-columns: 1fr;
      }
    }

    @media print {
      body {
        background: #fff;
        color: #111;
      }

      .app {
        width: auto;
        padding: 0;
      }

      .topbar,
      .journal-panel,
      .expense-panel,
      .panel-header,
      .panel-body > :not(.report-grid),
      .panel-footer,
      .report-source,
      .label[for="reportSource"] {
        display: none !important;
      }

      .workspace,
      .report-grid {
        display: block;
      }

      .panel,
      .preview-frame {
        border: 0;
        height: auto;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="title-block">
        <h1>数物工作周报</h1>
        <p class="save-state" id="saveState">准备就绪</p>
      </div>
      <div class="metrics" aria-label="统计">
        <div class="metric">
          <span>本周费用</span>
          <strong id="weekTotal">￥0.00</strong>
        </div>
        <div class="metric">
          <span>本月费用</span>
          <strong id="monthTotal">￥0.00</strong>
        </div>
        <div class="metric">
          <span>云端同步 (Gist)</span>
          <div class="actions" style="margin-top:4px;gap:4px">
            <button type="button" id="cloudNew" class="ghost" style="font-size:11px;min-height:26px;padding:0 8px;color:#4fd1bd">新建</button>
            <button type="button" id="cloudConnect" class="ghost" style="font-size:11px;min-height:26px;padding:0 8px">连接</button>
            <button type="button" id="cloudSync" class="ghost" style="font-size:11px;min-height:26px;padding:0 8px;display:none">同步</button>
            <button type="button" id="cloudCopy" class="ghost" style="font-size:11px;min-height:26px;padding:0 8px;display:none">复制ID</button>
          </div>
          <small id="cloudStatus" style="font-size:10px;color:#aeb4b7;display:block;margin-top:2px">未连接</small>
        </div>
      </div>
    </header>

    <main class="workspace">
      <section class="panel journal-panel" aria-labelledby="journalTitle">
        <div class="panel-header">
          <h2 id="journalTitle">日报</h2>
          <small id="journalWordCount">0 字</small>
        </div>
        <div class="panel-body">
          <div class="field">
            <label for="journalDate">日期</label>
            <input id="journalDate" type="date">
          </div>
          <div class="week-strip" id="weekStrip" aria-label="自然周"></div>
          <textarea id="journalText" class="journal-text" spellcheck="true" placeholder="今天做了什么"></textarea>
        </div>
        <div class="panel-footer">
          <div class="actions between">
            <span class="journal-meta" id="journalMeta">未记录</span>
            <div class="actions">
              <button type="button" id="clearJournal" class="danger" title="清空当前日期">清空</button>
              <button type="button" id="saveNow" class="primary" title="立即保存">保存</button>
            </div>
          </div>
        </div>
      </section>

      <section class="panel expense-panel" aria-labelledby="expenseTitle">
        <div class="panel-header">
          <h2 id="expenseTitle">费用</h2>
          <small id="expenseRange">本周</small>
        </div>
        <div class="panel-body">
          <form id="expenseForm" class="expense-form">
            <input id="expenseDate" type="hidden" required>
            <div class="field">
              <label for="expenseType">类型</label>
              <select id="expenseType">
                <option>打车</option>
                <option>地铁</option>
                <option>餐饮</option>
                <option>停车</option>
                <option>其他</option>
              </select>
            </div>
            <div class="field">
              <label for="expenseAmount">金额</label>
              <input id="expenseAmount" type="number" min="0.01" step="0.01" placeholder="0.00" required>
            </div>
            <input id="expenseNote" type="hidden" value="">
            <div class="submit-row">
              <button type="submit" class="primary" title="添加费用">添加</button>
            </div>
          </form>

          <div class="week-strip expense-week-strip" id="expenseWeekStrip" aria-label="费用周日期"></div>

          <details class="trip-import-panel">
            <summary>月度行程导入</summary>
            <div class="trip-import-body">
              <div class="trip-import-actions">
                <input id="tripImportFile" type="file" accept=".txt,.csv,.tsv,.pdf,application/pdf,text/plain,text/csv" hidden>
                <button type="button" id="tripImportChoose">上传行程单</button>
                <button type="button" id="tripImportParse" class="primary">解析行程</button>
                <button type="button" id="tripImportApply">确认导入费用</button>
                <button type="button" id="tripImportClear" class="ghost">清空</button>
              </div>
              <textarea id="tripImportText" class="trip-import-text" spellcheck="false" placeholder="月底处理时，把滴滴行程单明细复制到这里，或上传滴滴 PDF / CSV / TXT。示例：2026-06-10 36.50 客户现场交通"></textarea>
              <div id="tripImportResult" class="trip-import-result">
                <div class="empty">解析后会在这里确认日期和金额</div>
              </div>
            </div>
          </details>

          <div class="actions between">
            <div class="segment" role="tablist" aria-label="费用范围">
              <button type="button" data-expense-view="week" class="active">本周</button>
              <button type="button" data-expense-view="month">本月</button>
              <button type="button" data-expense-view="all">全部</button>
            </div>
            <button type="button" id="clearExpenses" class="ghost danger" title="删除当前范围费用">清空范围</button>
          </div>

          <div class="summary-line" id="expenseSummary"></div>
          <div class="table-wrap" id="expenseTableWrap"></div>
        </div>
      </section>

      <section class="panel report-panel" aria-labelledby="reportTitle">
        <div class="panel-header">
          <h2 id="reportTitle">周报</h2>
          <small id="reportRange">本周</small>
        </div>
        <div class="panel-body">
          <div class="field-grid report-controls">
            <div class="field">
              <label for="userName">姓名</label>
              <input id="userName" type="text" value="袁宏林" maxlength="20">
            </div>
            <div class="field">
              <label for="reportDate">周报日期</label>
              <input id="reportDate" type="date">
            </div>
            <div class="field">
              <label for="reportFileName">文件名</label>
              <input id="reportFileName" type="text" value="周报.xlsx">
            </div>
            <div class="field">
              <label>&nbsp;</label>
              <button type="button" id="generateReport" class="primary" title="生成周报">生成周报</button>
            </div>
          </div>

          <details class="template-panel">
            <summary>高级：导出模板</summary>
            <div class="template-tools" aria-label="占位符">
              <button type="button" class="token-button" data-token="{{DATE_RANGE}}">{{DATE_RANGE}}</button>
              <button type="button" class="token-button" data-token="{{USER_NAME}}">{{USER_NAME}}</button>
              <button type="button" class="token-button" data-token="{{WORK_CONTENT}}">{{WORK_CONTENT}}</button>
              <button type="button" class="token-button" data-token="{{EXPENSE_TABLE}}">{{EXPENSE_TABLE}}</button>
              <button type="button" class="token-button" data-token="{{TOTAL_EXPENSE}}">{{TOTAL_EXPENSE}}</button>
              <button type="button" class="token-button" data-token="{{XLS_WEEK_ROWS}}">{{XLS_WEEK_ROWS}}</button>
              <button type="button" class="token-button" data-token="{{TOTAL_EXPENSE_NUMBER}}">{{TOTAL_EXPENSE_NUMBER}}</button>
              <button type="button" id="restoreTemplate" class="ghost" title="恢复默认模板">恢复默认</button>
            </div>
            <textarea id="templateText" class="template-text" spellcheck="false"></textarea>
          </details>

          <div class="actions report-export-actions" style="margin-top: 12px;">
            <span class="journal-meta source-hidden" id="reportMeta">未生成</span>
            <button type="button" id="copyReport" class="source-hidden" title="复制生成后的 HTML" aria-hidden="true" tabindex="-1">复制HTML</button>
            <button type="button" id="downloadReport" class="primary" title="下载 Excel 可打开的周报">下载周报</button>
            <button type="button" id="printReport" title="打印生成后的周报">打印周报</button>
          </div>

          <details class="output-panel" id="outputPanel">
            <summary>可选：查看导出预览</summary>
            <textarea id="reportSource" class="source-hidden" spellcheck="false" readonly aria-hidden="true" tabindex="-1"></textarea>
            <div class="report-grid">
              <div class="field">
                <span class="label">预览</span>
                <iframe id="reportPreview" class="preview-frame" title="周报预览" sandbox=""></iframe>
              </div>
            </div>
          </details>
        </div>
      </section>

      function addExpense() {

      async function loadTripImportFile() {
        const file = els.tripImportFile.files[0];
        if (!file) return;
        const name = file.name || "";
        const isPdf = file.type === "application/pdf" || /\.pdf$/i.test(name);
        const isText = /(\.txt|\.csv|\.tsv)$/i.test(name) || /^(text\/|application\/vnd\.ms-excel)/i.test(file.type || "");
        try {
          if (isPdf) {
            toast("正在读取 PDF 行程单...");
            const text = normalizeTripImportText(await extractPdfTextFromFile(file));
            if (!text) {
              pendingTripRows = [];
              els.tripImportText.value = "";
              renderTripImportRows();
              toast("PDF 里没有识别到文字，请改用 CSV/TXT 或复制行程明细");
              return;
            }
            els.tripImportText.value = text;
            parseTripImportText();
            return;
          }
          if (!isText) {
            toast("当前支持滴滴 PDF、CSV、TXT；图片需要 OCR，暂不支持");
            return;
          }
          els.tripImportText.value = normalizeTripImportText(await file.text());
          parseTripImportText();
        } catch (error) {
          console.error(error);
          if (isPdf) {
            els.tripImportText.value = "";
          }
          const fallback = isPdf ? "，也可以先把 PDF 内容复制到文本框" : "";
          toast(`文件读取失败${fallback}`);
        } finally {
          els.tripImportFile.value = "";
        }
      }

      async function extractPdfTextFromFile(file) {
        const pdfjsLib = await loadPdfJs();
        let pdf = null;
        try {
          const data = new Uint8Array(await file.arrayBuffer());
          const loadingTask = pdfjsLib.getDocument({
            data,
            disableWorker: true,
            isEvalSupported: false
          });
          pdf = await loadingTask.promise;
          const lines = [];
          for (let pageNumber = 1; pageNumber <= pdf.numPages; pageNumber += 1) {
            const page = await pdf.getPage(pageNumber);
            const content = await page.getTextContent({ normalizeWhitespace: true });
            lines.push(...pdfTextItemsToLines(content.items || []));
          }
          return lines.join("\n");
        } finally {
          if (pdf && typeof pdf.destroy === "function") {
            await pdf.destroy();
          }
        }
      }

      function loadPdfJs() {
        if (window.pdfjsLib && typeof window.pdfjsLib.getDocument === "function") {
          configurePdfJs(window.pdfjsLib);
          return Promise.resolve(window.pdfjsLib);
        }
        if (!pdfJsLoadPromise) {
          pdfJsLoadPromise = new Promise((resolve, reject) => {
            const script = document.createElement("script");
            script.src = PDFJS_URL;
            script.async = true;
            script.crossOrigin = "anonymous";
            script.onload = () => {
              if (!window.pdfjsLib || typeof window.pdfjsLib.getDocument !== "function") {
                pdfJsLoadPromise = null;
                reject(new Error("PDF.js did not load"));
                return;
              }
              configurePdfJs(window.pdfjsLib);
              resolve(window.pdfjsLib);
            };
            script.onerror = () => {
              pdfJsLoadPromise = null;
              reject(new Error("PDF.js load failed"));
            };
            document.head.appendChild(script);
          });
        }
        return pdfJsLoadPromise;
      }

      function configurePdfJs(pdfjsLib) {
        if (pdfjsLib.GlobalWorkerOptions) {
          pdfjsLib.GlobalWorkerOptions.workerSrc = PDFJS_WORKER_URL;
        }
      }

      function pdfTextItemsToLines(items) {
        const tokens = items
          .map((item) => {
            const text = String(item.str || "").replace(/\s+/g, " ").trim();
            const transform = item.transform || [1, 0, 0, 1, 0, 0];
            return {
              text,
              x: Number(transform[4]) || 0,
              y: Number(transform[5]) || 0,
              height: Math.abs(Number(item.height) || Number(transform[3]) || 10)
            };
          })
          .filter((item) => item.text);
        tokens.sort((a, b) => Math.abs(b.y - a.y) > 3 ? b.y - a.y : a.x - b.x);
        const rows = [];
        tokens.forEach((token) => {
          const row = rows.find((candidate) => Math.abs(candidate.y - token.y) <= Math.max(2, token.height * 0.35));
          if (row) {
            row.items.push(token);
            row.y = (row.y + token.y) / 2;
          } else {
            rows.push({ y: token.y, items: [token] });
          }
        });
        return rows
          .sort((a, b) => b.y - a.y)
          .map((row) => row.items
            .sort((a, b) => a.x - b.x)
            .map((item) => item.text)
            .join(" ")
            .replace(/\s+/g, " ")
            .trim())
          .filter(Boolean);
      }

      function normalizeTripImportText(text) {
        return String(text || "")
          .replace(/\u00a0/g, " ")
          .replace(/[ \t]+\n/g, "\n")
          .replace(/\n{3,}/g, "\n\n")
          .trim();
      }

      function parseTripImportText() {
        const text = els.tripImportText.value.trim();
        if (!text) {
          pendingTripRows = [];
          renderTripImportRows();
          toast("请先粘贴或上传行程明细");
          return;
        }
        pendingTripRows = parseTripRows(text);
        renderTripImportRows();
        toast(pendingTripRows.length ? `识别到 ${pendingTripRows.length} 条行程` : "没有识别到行程，请检查文本格式");
      }

      function parseTripRows(text) {
        const importYear = inferTripImportYear(text);
        return text
          .split(/\r?\n/)
          .map((line) => line.trim())
          .filter(Boolean)
          .map((line, index) => parseTripLine(line, index + 1, importYear))
          .filter(Boolean);
      }

      function parseTripLine(line, lineNumber, importYear) {
        if (/^(滴滴出行|DIDI|页码)|行程起止日期|申请日期|手机号|共\d+笔|合计|序号|金额\[|TRIP TABLE/i.test(line)) {
          return null;
        }
        const dateKey = extractTripDate(line, importYear);
        const amount = extractTripAmount(line);
        if (!dateKey || !Number.isFinite(amount) || amount <= 0) {
          return null;
        }
        return {
          selected: true,
          date: dateKey,
          type: "打车",
          amount: roundMoney(amount),
          note: "",
          sourceLine: line,
          lineNumber
        };
      }

      function inferTripImportYear(text) {
        const fullDate = String(text || "").match(/((?:19|20)\d{2})\s*[年\/.-]\s*\d{1,2}\s*[月\/.-]\s*\d{1,2}/);
        return fullDate ? Number(fullDate[1]) : parseDateKey(state.reportDate).getFullYear();
      }

      function extractTripDate(line, importYear) {
        const reportYear = Number(importYear) || parseDateKey(state.reportDate).getFullYear();
        const fullDate = line.match(/(\d{4})\s*[年\/.-]\s*(\d{1,2})\s*[月\/.-]\s*(\d{1,2})\s*日?/);
        if (fullDate) {
          return normalizeDateParts(fullDate[1], fullDate[2], fullDate[3]);
        }
        const cnDate = line.match(/(\d{1,2})月\s*(\d{1,2})日/);
        if (cnDate) {
          return normalizeDateParts(reportYear, cnDate[1], cnDate[2]);
        }
        const shortDate = line.match(/(?:^|[,\s\t，])(\d{1,2})\s*[\/-]\s*(\d{1,2})(?=[,\s\t，]|$)/);
        if (shortDate) {
          return normalizeDateParts(reportYear, shortDate[1], shortDate[2]);
        }
        return "";
      }

      function extractTripAmount(line) {
        const currency = line.match(/[￥¥]\s*(\d+(?:\.\d{1,2})?)/);
        if (currency) {
          return Number.parseFloat(currency[1]);
        }
        const withoutDate = line
          .replace(/\d{4}\s*[年\/.-]\s*\d{1,2}\s*[月\/.-]\s*\d{1,2}\s*日?/g, " ")
          .replace(/\d{1,2}月\s*\d{1,2}日/g, " ")
          .replace(/\b\d{1,2}\s*[\/-]\s*\d{1,2}\b/g, " ")
          .replace(/\b\d{1,2}\s*[:：]\s*\d{2}(?:\s*[:：]\s*\d{2})?\b/g, " ");
        const decimals = [...withoutDate.matchAll(/\b\d{1,5}\.\d{1,2}\b/g)].map((match) => Number.parseFloat(match[0]));
        if (decimals.length) {
          return decimals[decimals.length - 1];
        }
        const moneyAfterLabel = withoutDate.match(/(?:金额|费用|实付|合计|支付)[^\d]*(\d{1,5})\b/);
        if (moneyAfterLabel) {
          return Number.parseFloat(moneyAfterLabel[1]);
        }
        const csvParts = line.split(/[,\t，]/).map((part) => part.trim());
        const numericParts = csvParts
          .filter((part) => /^\d{1,5}$/.test(part))
          .map(Number);
        return numericParts.length ? numericParts[numericParts.length - 1] : NaN;
      }

      function normalizeDateParts(year, month, day) {
        const date = new Date(Number(year), Number(month) - 1, Number(day));
        if (date.getFullYear() !== Number(year) || date.getMonth() !== Number(month) - 1 || date.getDate() !== Number(day)) {
          return "";
        }
        return toDateKey(date);
      }

      function renderTripImportRows() {
        if (!pendingTripRows.length) {
          els.tripImportResult.innerHTML = `<div class="empty">暂无待确认行程</div>`;
          return;
        }
        const rows = pendingTripRows.map((row, index) => `<tr data-trip-index="${index}">
          <td><input type="checkbox" data-trip-field="selected" ${row.selected ? "checked" : ""} title="导入这条"></td>
          <td><input type="date" data-trip-field="date" value="${escapeHtml(row.date)}"></td>
          <td><input type="number" min="0.01" step="0.01" data-trip-field="amount" value="${escapeHtml(formatGeneralMoney(row.amount))}"></td>
        </tr>`).join("");
        els.tripImportResult.innerHTML = `<div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>导入</th>
                <th>日期</th>
                <th class="amount">金额</th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>
        </div>`;
      }

      function readTripImportRowsFromDom() {
        return Array.from(els.tripImportResult.querySelectorAll("[data-trip-index]"))
          .map((tr) => {
            const get = (field) => tr.querySelector(`[data-trip-field="${field}"]`);
            return {
              selected: Boolean(get("selected") && get("selected").checked),
              date: normalizeDateKey(get("date") ? get("date").value : ""),
              amount: roundMoney(Number.parseFloat(get("amount") ? get("amount").value : ""))
            };
          });
      }

      function applyTripImportRows() {
        const rows = readTripImportRowsFromDom()
          .filter((row) => row.selected && row.date && Number.isFinite(row.amount) && row.amount > 0);
        if (!rows.length) {
          toast("没有可导入的有效行程");
          return;
        }
        rows.forEach((row) => {
          state.expenses.push({
            id: createId(),
            date: row.date,
            type: "打车",
            amount: row.amount,
            note: ""
          });
        });
        state.expenses.sort((a, b) => a.date.localeCompare(b.date) || a.type.localeCompare(b.type));
        state.reportDate = rows[0].date;
        els.reportDate.value = state.reportDate;
        els.expenseDate.value = state.reportDate;
        state.expenseView = "month";
        updateExpenseViewButtons();
        pendingTripRows = [];
        renderTripImportRows();
        renderAll();
        persist("已保存");
        toast(`已导入 ${rows.length} 条打车费用`);
      }

      function clearTripImport() {
        pendingTripRows = [];
        els.tripImportText.value = "";
        renderTripImportRows();
      }

      function renderAll() {
        renderStats();
        renderJournal();
        renderExpenses();
        renderReportRange();
        updateSaveState("已保存到本地");
      }

      function renderStats() {
        const bounds = getWorkWeekBounds(parseDateKey(state.reportDate));
        const weekItems = state.expenses.filter((item) => isInRange(item.date, bounds.startKey, bounds.endKey));
        const monthItems = state.expenses.filter((item) => isSameMonth(item.date, state.reportDate));
        const writtenDays = getWorkdays(state.reportDate).filter((dateKey) => hasJournalEntry(dateKey));
        els.weekTotal.textContent = formatMoney(sumExpenses(weekItems));
        els.monthTotal.textContent = formatMoney(sumExpenses(monthItems));
        if (els.journalDays) {
          els.journalDays.textContent = writtenDays.length;
        }
        if (els.journalDaysPreview) {
          els.journalDaysPreview.textContent = writtenDays.length
            ? writtenDays.map((dateKey) => `${getWeekdayName(parseDateKey(dateKey))} ${formatMonthDay(dateKey)}`).join("、")
            : "暂无记录";
          els.journalDaysPreview.title = els.journalDaysPreview.textContent;
        }
      }

      function renderJournal() {
        const dateKey = els.journalDate.value || state.selectedDate;
        const text = els.journalText.value || "";
        const words = countChineseAware(text);
        els.journalWordCount.textContent = `${words} 字`;
        els.journalMeta.textContent = text.trim() ? `${formatDateCn(dateKey)} 已记录` : `${formatDateCn(dateKey)} 未记录`;
        renderWeekStrip();
        renderStats();
      }

      function renderWeekStrip() {
        const active = els.journalDate.value || state.selectedDate;
        const days = getWorkdays(active);
        els.weekStrip.innerHTML = days.map((dateKey) => {
          const date = parseDateKey(dateKey);
          const hasNote = Boolean((state.journals[dateKey] || "").trim());
          const classes = ["day-pill"];
          if (dateKey === active) classes.push("active");
          if (hasNote) classes.push("has-note");
          return `<button type="button" class="${classes.join(" ")}" data-journal-day="${dateKey}">
            <strong>${escapeHtml(getWeekdayName(date))}</strong>
            <span>${escapeHtml(formatMonthDay(dateKey))}</span>
          </button>`;
        }).join("");

        els.weekStrip.querySelectorAll("[data-journal-day]").forEach((button) => {
          button.addEventListener("click", () => {
            saveCurrentJournal();
            state.selectedDate = button.dataset.journalDay;
            els.journalDate.value = state.selectedDate;
            syncWeekContext(state.selectedDate);
            els.journalText.value = state.journals[state.selectedDate] || "";
            renderJournal();
            renderExpenses();
            renderReportRange();
            queuePersist();
          });
        });
      }

      function renderExpenseWeekStrip() {
        const active = normalizeDateKey(els.expenseDate.value) || state.reportDate || toDateKey(new Date());
        const days = getWorkdays(active);
        const expensesByDate = groupExpensesByDate(state.expenses);
        els.expenseWeekStrip.innerHTML = days.map((dateKey) => {
          const date = parseDateKey(dateKey);
          const dayItems = expensesByDate[dateKey] || [];
          const total = sumExpenses(dayItems);
          const classes = ["day-pill", "expense-day-pill"];
          if (dateKey === active) classes.push("active");
          if (dayItems.length) classes.push("has-expense");
          return `<button type="button" class="${classes.join(" ")}" data-expense-day="${dateKey}">
            <strong>${escapeHtml(getWeekdayName(date))}</strong>
            <span>${escapeHtml(formatMonthDay(dateKey))}</span>
            <span class="day-total">${dayItems.length ? escapeHtml(formatCompactMoney(total)) : "无"}</span>
          </button>`;
        }).join("");

        els.expenseWeekStrip.querySelectorAll("[data-expense-day]").forEach((button) => {
          button.addEventListener("click", () => {
            const dateKey = button.dataset.expenseDay;
            els.expenseDate.value = dateKey;
            state.reportDate = dateKey;
            els.reportDate.value = dateKey;
            state.expenseView = "week";
            updateExpenseViewButtons();
            renderStats();
            renderExpenses();
            renderReportRange();
            queuePersist();
          });
        });
      }

      function renderExpenses() {
        renderExpenseWeekStrip();
        const items = getVisibleExpenses();
        const rangeLabel = getExpenseRangeLabel();
        const total = sumExpenses(items);
        const byType = groupExpenseByType(items);
        els.expenseRange.textContent = rangeLabel;
        els.expenseSummary.innerHTML = [
          `<span>${escapeHtml(rangeLabel)} <strong>${formatMoney(total)}</strong></span>`,
          `<span>${items.length} 条</span>`,
          ...Object.entries(byType).map(([type, value]) => `<span>${escapeHtml(type)} <strong>${formatMoney(value)}</strong></span>`)
        ].join("");

        if (!items.length) {
          els.expenseTableWrap.innerHTML = `<div class="empty">暂无费用</div>`;
          return;
        }

        const rows = items
          .slice()
          .sort((a, b) => b.date.localeCompare(a.date) || b.id.localeCompare(a.id))
          .map((item) => `<tr>
            <td>${escapeHtml(shortDate(item.date))}</td>
            <td><span class="type-badge">${escapeHtml(item.type)}</span></td>
            <td class="amount">${formatMoney(item.amount)}</td>
            <td><button type="button" class="icon-only danger" title="删除费用" data-delete-expense="${escapeHtml(item.id)}">×</button></td>
          </tr>`)
          .join("");

        els.expenseTableWrap.innerHTML = `<table>
          <thead>
            <tr>
              <th>日期</th>
              <th>类型</th>
              <th class="amount">金额</th>
              <th aria-label="操作"></th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>`;
      }

      function renderReportRange() {
        const bounds = getWorkWeekBounds(parseDateKey(state.reportDate));
        els.reportRange.textContent = `${shortDate(bounds.startKey)} 至 ${shortDate(bounds.endKey)}`;
      }

      function generateAndRenderReport() {
        saveCurrentJournal();
        state.template = els.templateText.value || DEFAULT_TEMPLATE;
        state.reportDate = normalizeDateKey(els.reportDate.value) || toDateKey(new Date());
        state.reportFileName = normalizeReportFileName(els.reportFileName.value || suggestedReportName());
        els.reportFileName.value = state.reportFileName;
        const report = buildReportHtml(fillTemplate(state.template, state.reportDate));
        state.generatedReport = report;
        els.reportSource.value = report;
        els.reportPreview.srcdoc = report;
        els.reportMeta.textContent = `${formatDateTime(new Date())} 生成`;
        persist("已保存");
      }

      function fillTemplate(template, reportDateKey) {
        const bounds = getWorkWeekBounds(parseDateKey(reportDateKey));
        const expenseItems = state.expenses
          .filter((item) => isInRange(item.date, bounds.startKey, bounds.endKey))
          .sort((a, b) => a.date.localeCompare(b.date) || a.type.localeCompare(b.type));
        const total = sumExpenses(expenseItems);
        const replacements = {
          DATE_RANGE: `${formatDateCn(bounds.startKey)} 至 ${formatDateCn(bounds.endKey)}`,
          USER_NAME: escapeHtml(normalizeUserName(state.userName)),
          XLS_WEEK_ROWS: buildXlsWeekRowsHtml(bounds.startKey, expenseItems),
          WORK_CONTENT: buildWorkContentHtml(bounds.startKey),
          EXPENSE_TABLE: buildExpenseTableHtml(expenseItems),
          TOTAL_EXPENSE: formatMoney(total),
          TOTAL_EXPENSE_NUMBER: formatGeneralMoney(total)
        };

        return Object.entries(replacements).reduce((html, [key, value]) => {
          return html.replace(new RegExp(`{{\\s*${key}\\s*}}`, "g"), value);
        }, template);
      }

      function buildWorkContentHtml(startKey) {
        return getWorkdays(startKey).map((dateKey) => {
          const content = (state.journals[dateKey] || "").trim();
          const body = content
            ? `<div class="work-entry">${escapeHtml(content).replace(/\n/g, "<br>")}</div>`
            : `<div class="work-entry muted">暂无记录</div>`;
          return `<section class="work-day">
            <h3>${escapeHtml(getWeekdayName(parseDateKey(dateKey)))} ${escapeHtml(formatDateCn(dateKey))}</h3>
            ${body}
          </section>`;
        }).join("\n");
      }

      function buildXlsWeekRowsHtml(startKey, expenseItems) {
        const days = getWorkdays(startKey);
        const expensesByDate = groupExpensesByDate(expenseItems);
        const total = sumExpenses(expenseItems);

        return days.map((dateKey, dayIndex) => {
          const dayExpenses = expensesByDate[dateKey] || [];
          const lineLimit = dayIndex === 6 ? 1 : 2;
          const expenseLines = compactExpenseLines(dayExpenses, lineLimit);
          const firstLine = expenseLines[0] || null;
          const secondLine = expenseLines[1] || null;
          const content = (state.journals[dateKey] || "").trim();
          const weekday = getWeekdayNameFull(parseDateKey(dateKey));
          const workText = content ? escapeHtml(content).replace(/\n/g, "<br>") : "";
          const topCells = [
            `<td colspan="2" rowspan="2" class="xls-center xls-weekday">${escapeHtml(weekday)}</td>`,
            `<td rowspan="2" class="xls-center xls-date">${escapeHtml(formatMonthDay(dateKey))}</td>`,
            `<td rowspan="2" class="xls-work-cell">${workText}</td>`,
            buildXlsExpenseCells(firstLine)
          ].join("");

          const bottomExpenseCells = dayIndex === 6
            ? buildXlsTotalCells(total)
            : buildXlsExpenseCells(secondLine);

          return `<tr class="xls-day-row xls-day-top">${topCells}</tr>
      <tr class="xls-day-row xls-day-bottom">${bottomExpenseCells}</tr>`;
        }).join("\n      ");
      }

      function buildXlsExpenseCells(expense) {
        const tool = expense ? escapeHtml(expense.type) : "";
        const amount = expense ? escapeHtml(formatGeneralMoney(expense.amount)) : "";
        const note = expense ? escapeHtml(expense.note || "") : "";
        return `<td class="xls-center"></td>
        <td class="xls-center">${tool}</td>
        <td class="xls-center xls-money">${amount}</td>
        <td class="xls-center">${note}</td>
        <td class="xls-center"></td>
        <td class="xls-hidden-cell"></td>
        <td class="xls-center"></td>
        <td class="xls-center"></td>
        <td class="xls-center"></td>
        <td class="xls-center"></td>
        <td class="xls-center"></td>
        <td class="xls-center"></td>`;
      }

      function buildXlsTotalCells(total) {
        return `<td class="xls-center"></td>
        <td class="xls-center"></td>
        <td class="xls-center xls-money">${escapeHtml(formatGeneralMoney(total))}</td>
        <td class="xls-center"></td>
        <td class="xls-center"></td>
        <td class="xls-hidden-cell"></td>
        <td class="xls-center"></td>
        <td class="xls-center"></td>
        <td class="xls-center"></td>
        <td class="xls-center"></td>
        <td class="xls-center"></td>
        <td class="xls-center"></td>`;
      }

      function buildExpenseTableHtml(items) {
        if (!items.length) {
          return `<p class="muted">本周暂无费用。</p>`;
        }

        const rows = items.map((item) => `<tr>
          <td>${escapeHtml(formatDateCn(item.date))}</td>
          <td>${escapeHtml(item.type)}</td>
          <td class="amount">${formatMoney(item.amount)}</td>
        </tr>`).join("");

        return `<table class="expense-report-table">
          <thead>
            <tr>
              <th>日期</th>
              <th>类型</th>
              <th class="amount">金额</th>
            </tr>
          </thead>
          <tbody>
            ${rows}
            <tr class="total-row">
              <td colspan="2">合计</td>
              <td class="amount">${formatMoney(sumExpenses(items))}</td>
            </tr>
          </tbody>
        </table>`;
      }

      function buildReportHtml(content) {
        if (/<!doctype\s+html/i.test(content) || /<html[\s>]/i.test(content)) {
          return content;
        }

        return `<!doctype html>

      function emptyPreviewHtml() {
        return `<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><style>
          body { margin: 0; display: grid; place-items: center; min-height: 100vh; font: 14px "Microsoft YaHei", sans-serif; color: #626b68; background: #f5f6f2; }
        </style></head><body>暂无预览</body></html>`;
      }

      function buildXlsxBlob(reportDateKey) {
        const files = buildXlsxFiles(reportDateKey);
        return new Blob([zipFiles(files)], {
          type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"
        });
      }

      function buildXlsxFiles(reportDateKey) {
        const sheetXml = buildWorksheetXml(reportDateKey);
        const created = new Date().toISOString();
        return [
          {
            name: "[Content_Types].xml",
            content: `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types">
  <Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/>
  <Default Extension="xml" ContentType="application/xml"/>
  <Override PartName="/docProps/core.xml" ContentType="application/vnd.openxmlformats-package.core-properties+xml"/>
  <Override PartName="/docProps/app.xml" ContentType="application/vnd.openxmlformats-officedocument.extended-properties+xml"/>
  <Override PartName="/xl/workbook.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet.main+xml"/>
  <Override PartName="/xl/worksheets/sheet1.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.worksheet+xml"/>
  <Override PartName="/xl/styles.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.styles+xml"/>
</Types>`
          },
          {
            name: "_rels/.rels",
            content: `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">
  <Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="xl/workbook.xml"/>
  <Relationship Id="rId2" Type="http://schemas.openxmlformats.org/package/2006/relationships/metadata/core-properties" Target="docProps/core.xml"/>
  <Relationship Id="rId3" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/extended-properties" Target="docProps/app.xml"/>
</Relationships>`
          },
          {
            name: "docProps/core.xml",
            content: `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<cp:coreProperties xmlns:cp="http://schemas.openxmlformats.org/package/2006/metadata/core-properties" xmlns:dc="http://purl.org/dc/elements/1.1/" xmlns:dcterms="http://purl.org/dc/terms/" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance">
  <dc:title>数物工作周报</dc:title>
  <dc:creator>数物工作周报</dc:creator>
  <cp:lastModifiedBy>数物工作周报</cp:lastModifiedBy>
  <dcterms:created xsi:type="dcterms:W3CDTF">${created}</dcterms:created>
  <dcterms:modified xsi:type="dcterms:W3CDTF">${created}</dcterms:modified>
</cp:coreProperties>`
          },
          {

      function buildWorksheetData(reportDateKey) {
        const rows = Array.from({ length: 26 }, () => Array.from({ length: 16 }, () => ({ value: "", style: 1 })));
        const set = (row, col, value, style = 1) => {
          rows[row - 1][col - 1] = { value, style };
        };
        const styleRow = (row, style) => {
          for (let col = 1; col <= 16; col++) {
            rows[row - 1][col - 1].style = style;
          }
        };

        styleRow(1, 5);
        styleRow(2, 2);
        styleRow(3, 3);
        styleRow(21, 3);
        styleRow(22, 4);
        styleRow(24, 6);
        styleRow(26, 6);

        set(2, 1, `姓名：${normalizeUserName(state.userName)}                                                职位：                                                监督人：`, 2);
        set(3, 1, "本 周 工 作 记 录", 3);
        set(3, 5, "本周报销款项", 3);
        set(4, 1, "具 体 时 间", 4);
        set(4, 4, "工作内容记录", 4);
        set(4, 5, "编号", 4);
        set(4, 6, "交通", 4);
        set(4, 9, "出差补助", 4);
        set(4, 13, "其他费用金额", 4);
        set(5, 6, "工具");
        set(5, 7, "金额");
        set(5, 8, "用途");
        set(5, 9, "天数");
        set(5, 11, "补助标准");
        set(5, 12, "金额");
        set(5, 13, "住宿");
        set(5, 14, "保险");
        set(5, 15, "快递");
        set(5, 16, "备注");

        const bounds = getWorkWeekBounds(parseDateKey(reportDateKey));
        const weekExpenses = state.expenses
          .filter((item) => isInRange(item.date, bounds.startKey, bounds.endKey))
          .sort((a, b) => a.date.localeCompare(b.date) || a.type.localeCompare(b.type));
        const expensesByDate = groupExpensesByDate(weekExpenses);
        const total = sumExpenses(weekExpenses);
        getWorkdays(reportDateKey).forEach((dateKey, index) => {
          const topRow = 6 + index * 2;
          const bottomRow = topRow + 1;
          const lineLimit = index === 6 ? 1 : 2;
          const expenseLines = compactExpenseLines(expensesByDate[dateKey] || [], lineLimit);
          set(topRow, 1, getWeekdayNameFull(parseDateKey(dateKey)));
          set(topRow, 3, formatMonthDay(dateKey));
          set(topRow, 4, String(state.journals[dateKey] || "").trim());
          applyExpenseToRow(rows, topRow, expenseLines[0]);
          if (index === 6) {
            set(bottomRow, 7, total);
          } else {
            applyExpenseToRow(rows, bottomRow, expenseLines[1]);
          }
        });

        set(21, 1, "本周工作总结", 3);
        set(21, 5, "下周工作计划", 3);
        set(22, 1, "任务", 4);
        set(22, 2, "本周完成主要工作", 4);
        set(22, 5, "任务", 4);
        set(22, 6, "下周主要事项", 4);
        for (let i = 0; i < 4; i++) {
          set(23 + i, 1, i + 1, i % 2 ? 6 : 7);
          set(23 + i, 5, i + 1, i % 2 ? 6 : 7);
        }

        return {
          rows,
          merges: buildWorksheetMerges()
        };
      }

      function applyExpenseToRow(rows, rowNumber, expense) {
        if (!expense) return;
        rows[rowNumber - 1][5] = { value: expense.type || "", style: 1 };
        rows[rowNumber - 1][6] = { value: roundMoney(expense.amount || 0), style: 1 };
        rows[rowNumber - 1][7] = { value: expense.note || "", style: 1 };
      }

      function buildWorksheetMerges() {
        const merges = [
          "A1:P1", "A2:P2", "A3:D3", "E3:P3", "A4:C5", "D4:D5",
          "E4:E5", "F4:H4", "I4:L4", "M4:P4", "A20:P20",
          "A21:D21", "E21:P21", "B22:D22", "F22:P22",
          "B23:D23", "F23:P23", "B24:D24", "F24:P24",
          "B25:D25", "F25:P25", "B26:D26", "F26:P26"
        ];
        [6, 8, 10, 12, 14, 16, 18].forEach((row) => {
          merges.push(`A${row}:B${row + 1}`, `C${row}:C${row + 1}`, `D${row}:D${row + 1}`);
        });
        return merges;
      }

      function buildXlsxCellXml(row, col, cell) {
        const ref = `${columnName(col)}${row}`;
        const style = cell.style || 1;
        if (typeof cell.value === "number" && Number.isFinite(cell.value)) {
          return `<c r="${ref}" s="${style}"><v>${cell.value}</v></c>`;
        }
        const text = String(cell.value || "");
        if (!text) {
          return `<c r="${ref}" s="${style}"/>`;
        }
        return `<c r="${ref}" s="${style}" t="inlineStr"><is><t>${escapeXml(text)}</t></is></c>`;
      }

      function columnName(index) {
        let name = "";
        let current = index;
        while (current > 0) {
          const remainder = (current - 1) % 26;
          name = String.fromCharCode(65 + remainder) + name;
          current = Math.floor((current - 1) / 26);
        }
        return name;
      }

      function zipFiles(files) {
        const encoder = new TextEncoder();
        const localParts = [];
        const centralParts = [];
        let offset = 0;
        files.forEach((file) => {
          const nameBytes = encoder.encode(file.name);
          const data = encoder.encode(file.content);
          const crc = crc32(data);
          const localHeader = new Uint8Array(30 + nameBytes.length);
          const localView = new DataView(localHeader.buffer);
          localView.setUint32(0, 0x04034b50, true);
          localView.setUint16(4, 20, true);
          localView.setUint16(6, 0, true);
          localView.setUint16(8, 0, true);
          localView.setUint16(10, 0, true);
          localView.setUint16(12, 0, true);
          localView.setUint32(14, crc, true);
          localView.setUint32(18, data.length, true);
          localView.setUint32(22, data.length, true);
          localView.setUint16(26, nameBytes.length, true);
          localView.setUint16(28, 0, true);
          localHeader.set(nameBytes, 30);
          localParts.push(localHeader, data);

          const centralHeader = new Uint8Array(46 + nameBytes.length);
          const centralView = new DataView(centralHeader.buffer);
          centralView.setUint32(0, 0x02014b50, true);
          centralView.setUint16(4, 20, true);
          centralView.setUint16(6, 20, true);
          centralView.setUint16(8, 0, true);
          centralView.setUint16(10, 0, true);
          centralView.setUint16(12, 0, true);
          centralView.setUint16(14, 0, true);
          centralView.setUint32(16, crc, true);
          centralView.setUint32(20, data.length, true);
          centralView.setUint32(24, data.length, true);
          centralView.setUint16(28, nameBytes.length, true);
          centralView.setUint16(30, 0, true);
          centralView.setUint16(32, 0, true);
          centralView.setUint16(34, 0, true);
          centralView.setUint16(36, 0, true);
          centralView.setUint32(38, 0, true);
          centralView.setUint32(42, offset, true);
          centralHeader.set(nameBytes, 46);
          centralParts.push(centralHeader);
          offset += localHeader.length + data.length;
        });

        const centralSize = centralParts.reduce((total, part) => total + part.length, 0);
        const end = new Uint8Array(22);
        const endView = new DataView(end.buffer);
        endView.setUint32(0, 0x06054b50, true);
        endView.setUint16(8, files.length, true);
        endView.setUint16(10, files.length, true);
        endView.setUint32(12, centralSize, true);
        endView.setUint32(16, offset, true);
        return concatUint8Arrays([...localParts, ...centralParts, end]);
      }

      function concatUint8Arrays(parts) {
        const total = parts.reduce((sum, part) => sum + part.length, 0);
        const output = new Uint8Array(total);
        let offset = 0;
        parts.forEach((part) => {
          output.set(part, offset);
          offset += part.length;
        });
        return output;
      }

      function crc32(bytes) {
        if (!crc32.table) {
          crc32.table = Array.from({ length: 256 }, (_, index) => {
            let value = index;
            for (let bit = 0; bit < 8; bit++) {
              value = value & 1 ? 0xedb88320 ^ (value >>> 1) : value >>> 1;
            }
            return value >>> 0;
          });
        }
        let crc = 0xffffffff;
        for (let index = 0; index < bytes.length; index++) {
          crc = crc32.table[(crc ^ bytes[index]) & 0xff] ^ (crc >>> 8);
        }
        return (crc ^ 0xffffffff) >>> 0;
      }

      async function copyReport() {
        const report = ensureReport();
        try {
          await navigator.clipboard.writeText(report);
          toast("HTML 已复制");
        } catch (error) {
          els.reportSource.focus();
          els.reportSource.select();
          document.execCommand("copy");
          window.getSelection().removeAllRanges();
          toast("HTML 已复制");
        }
      }

      function downloadReport() {
        generateAndRenderReport();
        const blob = buildXlsxBlob(state.reportDate);
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = cleanExcelFileName(els.reportFileName.value) || suggestedReportName();
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);
        toast("周报已下载");
      }

      function printReport() {
        const report = ensureReport();
        const win = window.open("", "_blank");
        if (!win) {
          toast("弹窗被拦截，可先下载周报");
          return;
        }
        win.document.open();
        win.document.write(report);
        win.document.close();
        win.focus();
        setTimeout(() => win.print(), 250);
      }

      function ensureReport() {
        if (!state.generatedReport) {
          generateAndRenderReport();
        }
        return state.generatedReport;
      }

      function getVisibleExpenses() {
        const view = state.expenseView || "week";
        if (view === "all") {
          return state.expenses.slice();
        }
        if (view === "month") {
          return state.expenses.filter((item) => isSameMonth(item.date, state.reportDate));
        }
        const bounds = getWorkWeekBounds(parseDateKey(state.reportDate));
        return state.expenses.filter((item) => isInRange(item.date, bounds.startKey, bounds.endKey));
      }

      function getExpenseRangeLabel() {
        if (state.expenseView === "all") {
          return "全部";
        }
        if (state.expenseView === "month") {
          const date = parseDateKey(state.reportDate);
          return `${date.getFullYear()}年${pad2(date.getMonth() + 1)}月`;
        }
        const bounds = getWorkWeekBounds(parseDateKey(state.reportDate));
        return `${shortDate(bounds.startKey)} 至 ${shortDate(bounds.endKey)}`;
      }

      function updateExpenseViewButtons() {
        document.querySelectorAll("[data-expense-view]").forEach((button) => {
          button.classList.toggle("active", button.dataset.expenseView === state.expenseView);
        });
      }

      function saveCurrentJournal() {
        const dateKey = normalizeDateKey(els.journalDate.value) || toDateKey(new Date());
        state.selectedDate = dateKey;
        setJournalEntry(dateKey, els.journalText.value);
      }

      function syncWeekContext(dateKey) {
        const normalized = normalizeDateKey(dateKey) || toDateKey(new Date());
        state.reportDate = normalized;
        els.reportDate.value = normalized;
        els.expenseDate.value = normalized;
        state.expenseView = "week";
        updateExpenseViewButtons();
      }

      function setJournalEntry(dateKey, text) {
        const value = String(text || "");
        if (value.trim()) {
          state.journals[dateKey] = value;
        } else {
          delete state.journals[dateKey];
        }
      }

      function hasJournalEntry(dateKey) {
        return Boolean(String(state.journals[dateKey] || "").trim());
      }

      function sanitizeJournals() {
        Object.keys(state.journals).forEach((dateKey) => {
          if (!normalizeDateKey(dateKey) || !hasJournalEntry(dateKey)) {
            delete state.journals[dateKey];
          }
        });
      }

      function queuePersist() {
        updateSaveState("正在保存...");
        clearTimeout(persistTimer);
        persistTimer = setTimeout(() => persist("已保存"), 450);
      }

      function persist(message) {
        saveCurrentJournal();
        if (saveToStorage()) {
          updateSaveState(message || "已保存");
        }
      }

      function saveToStorage() {
        try {
          localStorage.setItem(STORE_KEY, JSON.stringify(state));
          return true;
        } catch (error) {
          updateSaveState("本地保存失败");
          toast("localStorage 保存失败");
          return false;
        }
      }

      function loadState() {
        try {
          const raw = localStorage.getItem(STORE_KEY);
          if (!raw) return createDefaultState();
          return { ...createDefaultState(), ...JSON.parse(raw) };
        } catch (error) {
          return createDefaultState();
        }
      }

      const CLOUD_KEY = "cloud-sync-url";

      function getCloudUrl() { return localStorage.getItem(CLOUD_KEY); }
      function setCloudUrl(url) { localStorage.setItem(CLOUD_KEY, url); }
      function getGistId() { return localStorage.getItem("gist-id"); }
      function setGistId(id) { localStorage.setItem("gist-id", id); }
      function getGistToken() { return localStorage.getItem("gist-token"); }
      function setGistToken(t) { try { localStorage.setItem("gist-token", t); } catch(e) { toast("无法保存 Token，请检查浏览器存储空间"); } }
      function updateCloudUI() {
        const url = getCloudUrl();
        if (getGistId() && getGistToken()) {
          els.cloudNew.style.display = "none";
          els.cloudConnect.style.display = "none";
          els.cloudSync.style.display = "inline-block";
          els.cloudCopy.style.display = "inline-block";
          els.cloudStatus.textContent = "已连接 (ID:" + getGistId().substring(0,12) + "...)";
          els.cloudStatus.style.color = "#4fd1bd";
        } else {
          els.cloudNew.style.display = "inline-block";
          els.cloudConnect.style.display = "inline-block";
          els.cloudSync.style.display = "none";
          els.cloudCopy.style.display = "none";
          els.cloudStatus.textContent = "未连接";
          els.cloudStatus.style.color = "#aeb4b7";
        }
      }

      async function cloudEnable() {
        saveCurrentJournal();
        let token = getGistToken();
        if (!token) {
          token = prompt("首次启用需要 GitHub Token（仅 gist 权限）：\n\n去 https://github.com/settings/tokens 生成\n→ Generate new token (classic)\n→ 勾选 gist\n→ 复制 token 粘贴到这里");
          if (!token) return;
          setGistToken(token);
        }
        try {
          const resp = await fetch("https://api.github.com/gists", {
            method: "POST",
            headers: { "Authorization": "Bearer " + token, "Accept": "application/vnd.github+json", "Content-Type": "application/json" },
            body: JSON.stringify({
              description: "work-journal-sync",
              public: false,
              files: { "work-journal.json": { content: JSON.stringify(state) } }
            })
          });
          const data = await resp.json();
          if (data.id) {
            setGistId(data.id);
            updateCloudUI();
            toast("云端已启用！复制此 Gist ID 到另一台设备: " + data.id);
          } else {
            toast("Token 无效，请重新生成");
            setGistToken("");
          }
        } catch (e) {
          toast("连接失败: " + e.message);
        }
      }

      async function cloudSync() {
        const gistId = getGistId();
        const token = getGistToken();
        if (!gistId || !token) return;
        saveCurrentJournal();
        try {
          await fetch("https://api.github.com/gists/" + gistId, {
            method: "PATCH",
            headers: { "Authorization": "Bearer " + token, "Accept": "application/vnd.github+json", "Content-Type": "application/json" },
            body: JSON.stringify({ files: { "work-journal.json": { content: JSON.stringify(state) } } })
          });
          toast("已同步");
        } catch (e) {
          toast("同步失败");
        }
      }

      async function cloudLoad(gistId) {
        let token = getGistToken();
        if (!token) {
          token = prompt("输入 GitHub Token（仅 gist 权限）：");
          if (!token) return;
          setGistToken(token);
        }
        try {
          const resp = await fetch("https://api.github.com/gists/" + gistId, {
            headers: { "Authorization": "Bearer " + getGistToken(), "Accept": "application/vnd.github+json" }
          });
          if (!resp.ok) {
            const err = await resp.json().catch(() => ({}));
            toast("错误: " + (err.message || "HTTP " + resp.status));
            if (resp.status === 401 || resp.status === 403) { setGistToken(""); toast("Token 无效或权限不足，请重新连接"); }
            return;
          }
          const data = await resp.json();
          const file = data.files && data.files["work-journal.json"];
          if (!file) { toast("Gist 中没有找到数据文件"); return; }
          const content = JSON.parse(file.content);
          setGistId(gistId);
          Object.assign(state, content);
          saveToStorage();
          try { hydrateControls(); } catch(e) {}
          try { renderAll(); } catch(e) {}
          try { updateCloudUI(); } catch(e) {}
          toast("云端数据已加载");
        } catch (e) {
          toast("加载失败: " + e.message);
        }
      }

      function cloudCopyUrl() {
        const gistId = getGistId();
        if (gistId) {
          navigator.clipboard.writeText(gistId).then(() => toast("Gist ID 已复制，发送到另一台设备"))
            .catch(() => toast("Gist ID: " + gistId));
        }
      }

      function cloudConnect() {
        const gistId = prompt("输入另一台设备上的 Gist ID：");
        if (gistId) cloudLoad(gistId);
      }

      function exportAllData() {
        saveCurrentJournal();
        const data = JSON.stringify(state, null, 2);
        const blob = new Blob([data], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = `work-journal-backup-${toDateKey(new Date())}.json`;
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);
        toast("数据已导出");
      }

      function importAllData() {
        const file = els.importFile.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
          try {
            const imported = JSON.parse(e.target.result);
            if (!imported.journals && !imported.expenses) {
              toast("无效的备份文件");
              return;
            }
            if (confirm("导入将覆盖当前数据，确定继续？")) {
              imported.selectedDate = imported.selectedDate || toDateKey(new Date());
              imported.reportDate = imported.reportDate || imported.selectedDate;
              imported.expenseView = imported.expenseView || "week";
              imported.generatedReport = imported.generatedReport || "";
              imported.template = imported.template || state.template;
              imported.reportFileName = imported.reportFileName || "周报.xlsx";
              imported.userName = normalizeUserName(imported.userName);
              imported.template = migrateUserNameTemplate(imported.template);
              Object.assign(state, imported);
              saveToStorage();
              hydrateControls();
              renderAll();
              toast("数据已导入并保存");
            }
          } catch (err) {
            toast("文件解析失败");
          }
        };
        reader.readAsText(file);
        els.importFile.value = "";
      }

      function createDefaultState() {
        const today = toDateKey(new Date());
        return {
          selectedDate: today,
          reportDate: today,
          expenseView: "week",
          journals: {},
          expenses: [],
          template: DEFAULT_TEMPLATE,
          templateVersion: TEMPLATE_VERSION,
          generatedReport: "",
          reportFileName: "周报.xlsx",
          userName: "袁宏林"
        };
      }

      function isLegacyDefaultTemplate(template) {
        const normalized = String(template || "").trim();
        return normalized === LEGACY_DEFAULT_TEMPLATE.trim()
          || normalized.includes("<h1>工作周报</h1>");
      }

      function isOutdatedExcelTemplate(template) {
        const normalized = String(template || "");
        return normalized.includes("weekly-xls-table")
          && normalized.includes("<span>姓名：袁宏林</span>");
      }

      function normalizeUserName(name) {
        const value = String(name || "").trim();
        return value || "袁宏林";
      }

      function migrateUserNameTemplate(template) {
        return String(template || DEFAULT_TEMPLATE)
          .replace(/姓名：袁宏林/g, "姓名：{{USER_NAME}}")
          .replace(/<span>姓名：袁宏林<\/span>/g, "<span>姓名：{{USER_NAME}}</span>");
      }

      function updateSaveState(message) {
        els.saveState.textContent = `${message} · ${formatDateTime(new Date())}`;
      }

      function toast(message) {
        clearTimeout(toastTimer);
        els.toast.textContent = message;
        els.toast.classList.add("show");
        toastTimer = setTimeout(() => els.toast.classList.remove("show"), 2200);
      }

      function insertAtCursor(textarea, token) {
        const start = textarea.selectionStart;
        const end = textarea.selectionEnd;
        const before = textarea.value.slice(0, start);
        const after = textarea.value.slice(end);
        textarea.value = `${before}${token}${after}`;
        textarea.focus();
        textarea.selectionStart = textarea.selectionEnd = start + token.length;
        textarea.dispatchEvent(new Event("input"));
      }

      function getWorkdays(referenceKey) {
        const start = getWorkWeekBounds(parseDateKey(referenceKey)).start;
        return Array.from({ length: 7 }, (_, index) => toDateKey(addDays(start, index)));
      }

      function getWorkWeekBounds(date) {
        const start = getMonday(date);
        const end = addDays(start, 6);
        return {
          start,
          end,
          startKey: toDateKey(start),
          endKey: toDateKey(end)
        };
      }

      function getMonday(date) {
        const copy = new Date(date.getFullYear(), date.getMonth(), date.getDate());
        const day = copy.getDay();
        const diff = day === 0 ? -6 : 1 - day;
        copy.setDate(copy.getDate() + diff);
        return copy;
      }

      function addDays(date, days) {
        const copy = new Date(date.getFullYear(), date.getMonth(), date.getDate());
        copy.setDate(copy.getDate() + days);
        return copy;
      }

      function parseDateKey(dateKey) {
        const normalized = normalizeDateKey(dateKey) || toDateKey(new Date());
        const [year, month, date] = normalized.split("-").map(Number);
        return new Date(year, month - 1, date);
      }

      function normalizeDateKey(value) {
        if (!value || !/^\d{4}-\d{2}-\d{2}$/.test(value)) {
          return "";
        }
        return value;
      }

      function toDateKey(date) {
        return `${date.getFullYear()}-${pad2(date.getMonth() + 1)}-${pad2(date.getDate())}`;
      }

      function shortDate(dateKey) {
        const date = parseDateKey(dateKey);
        return `${pad2(date.getMonth() + 1)}-${pad2(date.getDate())}`;
      }

      function formatMonthDay(dateKey) {
        const date = parseDateKey(dateKey);
        return `${date.getMonth() + 1}月${date.getDate()}日`;
      }

      function formatDateCn(dateKey) {
        const date = parseDateKey(dateKey);
        return `${date.getFullYear()}年${pad2(date.getMonth() + 1)}月${pad2(date.getDate())}日`;
      }

      function formatDateTime(date) {
        return `${pad2(date.getHours())}:${pad2(date.getMinutes())}:${pad2(date.getSeconds())}`;
      }

      function getWeekdayName(date) {
        return ["周日", "周一", "周二", "周三", "周四", "周五", "周六"][date.getDay()];
      }

      function getWeekdayNameFull(date) {
        return ["星期日", "星期一", "星期二", "星期三", "星期四", "星期五", "星期六"][date.getDay()];
      }

      function pad2(number) {
        return String(number).padStart(2, "0");
      }

      function isInRange(dateKey, startKey, endKey) {
        return dateKey >= startKey && dateKey <= endKey;
      }

      function isSameMonth(dateKey, referenceKey) {
        return dateKey.slice(0, 7) === referenceKey.slice(0, 7);
      }

      function sumExpenses(items) {
        return roundMoney(items.reduce((total, item) => total + Number(item.amount || 0), 0));
      }

      function groupExpenseByType(items) {
        return items.reduce((groups, item) => {
          groups[item.type] = roundMoney((groups[item.type] || 0) + Number(item.amount || 0));
          return groups;
        }, {});
      }

      function groupExpensesByDate(items) {
        return items.reduce((groups, item) => {
          if (!groups[item.date]) groups[item.date] = [];
          groups[item.date].push(item);
          return groups;
        }, {});
      }

      function compactExpenseLines(items, limit) {
        if (!items.length || limit <= 0) {
          return [];
        }
        if (items.length <= limit) {
          return items;
        }
        const lines = items.slice(0, Math.max(0, limit - 1));
        lines.push(combineExpenseLine(items.slice(limit - 1)));
        return lines;
      }

      function combineExpenseLine(items) {
        const type = [...new Set(items.map((item) => item.type).filter(Boolean))].join("/");
        const note = items
          .map((item) => item.note || "")
          .filter(Boolean)
          .join("；");
        return {
          type,
          amount: sumExpenses(items),
          note
        };
      }

      function roundMoney(value) {
        return Math.round((Number(value) + Number.EPSILON) * 100) / 100;
      }

      function formatMoney(value) {
        return `￥${roundMoney(value).toFixed(2)}`;
      }

      function formatCompactMoney(value) {
        return `￥${formatGeneralMoney(value)}`;
      }

      function formatGeneralMoney(value) {
        const rounded = roundMoney(value);
        if (Number.isInteger(rounded)) {
          return String(rounded);
        }
        return rounded.toFixed(2).replace(/0+$/, "").replace(/\.$/, "");
      }

      function countChineseAware(text) {
        const compact = text.replace(/\s+/g, "");
        return Array.from(compact).length;
      }

      function escapeHtml(value) {
        return String(value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      function escapeXml(value) {
        return String(value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&apos;");
      }

      function createId() {
        if (window.crypto && crypto.randomUUID) {
          return crypto.randomUUID();
        }
        return `${Date.now()}-${Math.random().toString(16).slice(2)}`;
      }

      function cleanFileName(name) {
        const cleaned = String(name || "")
          .replace(/[<>:"/\\|?*\x00-\x1F]/g, "-")
          .replace(/\s+/g, " ")
          .trim();
        if (!cleaned) return "";
        return cleaned.toLowerCase().endsWith(".html") ? cleaned : `${cleaned}.html`;
      }

      function normalizeReportFileName(name) {
        const cleaned = String(name || "").trim();
        if (!cleaned || cleaned === "周报.xls" || /^weekly-report(?:-\d{4}-\d{2}-\d{2}-\d{4}-\d{2}-\d{2})?\.(?:html?|xlsx?)$/i.test(cleaned)) {
          return "周报.xlsx";
        }
        return cleanExcelFileName(cleaned) || "周报.xlsx";
      }

      function cleanExcelFileName(name) {
        const cleaned = String(name || "")
          .replace(/[<>:"/\\|?*\x00-\x1F]/g, "-")
          .replace(/\s+/g, " ")
          .trim()
          .replace(/\.(html?|xlsx?)$/i, "");
        if (!cleaned) return "";
        return `${cleaned}.xlsx`;
      }

      function suggestedReportName() {
        return "周报.xlsx";
      }
    })();
  </script>
</body>
