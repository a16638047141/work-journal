name: Auto email weekly report

on:
  schedule:
    # Saturday 08:00 in Asia/Shanghai. GitHub cron uses UTC.
    - cron: "0 0 * * 6"
  workflow_dispatch:
    inputs:
      report_date:
        description: "Optional report date, for example 2026-06-19"
        required: false
        type: string
      dry_run:
        description: "Generate the attachment without sending email"
        required: false
        default: false
        type: boolean
      mail_from:
        description: "Optional sender display address"
        required: false
        type: string
      mail_to:
        description: "Optional recipients, separated by commas"
        required: false
        type: string
      mail_cc:
        description: "Optional CC recipients, separated by commas"
        required: false
        type: string

jobs:
  send-weekly-report:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate and send report
        env:
          TIME_ZONE: Asia/Shanghai
          REPORT_DATE: ${{ github.event.inputs.report_date || '' }}
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || false }}
          WORK_JOURNAL_GIST_ID: ${{ secrets.WORK_JOURNAL_GIST_ID }}
          WORK_JOURNAL_GIST_TOKEN: ${{ secrets.WORK_JOURNAL_GIST_TOKEN }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_SECURE: ${{ secrets.SMTP_SECURE }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          MAIL_FROM: ${{ github.event.inputs.mail_from || secrets.MAIL_FROM }}
          MAIL_TO: ${{ github.event.inputs.mail_to || secrets.MAIL_TO }}
          MAIL_CC: ${{ github.event.inputs.mail_cc || secrets.MAIL_CC }}
          MAIL_SUBJECT: ${{ secrets.MAIL_SUBJECT }}
          MAIL_TEXT: ${{ secrets.MAIL_TEXT }}
        run: npm run send-weekly-report

      - name: Upload generated report
        uses: actions/upload-artifact@v4
        if: ${{ always() && github.event_name == 'workflow_dispatch' && inputs.dry_run == true }}
        with:
          name: weekly-report
          path: dist/
